name: Build

on:
  workflow_dispatch: null
  workflow_call:
    inputs:
      go-version:
        description: "Go version to use"
        required: false
        type: string
        default: "1.26.0"
  pull_request: null
  push:
    branches:
      - main

env:
  GO_VERSION: ${{ inputs.go-version || '1.26.0' }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ["1.26.0"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Go project
        uses: ./.github/actions/setup-go-project
        with:
          go-version: ${{ matrix.go-version }}
          cache-key-suffix: "build-${{ matrix.os }}"

      - name: Get version metadata
        id: version_meta
        run: |
          echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: make build VERSION=${{ steps.version_meta.outputs.version }} GIT_SHA=${{ steps.version_meta.outputs.sha }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: nodecore-${{ matrix.os }}-${{ matrix.go-version }}-${{ steps.version_meta.outputs.sha }}
          path: nodecore
          retention-days: 7
